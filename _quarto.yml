project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "notes/*.qmd"
    - "activities/*.qmd"
    - "assignments/*.qmd"
    - "projects/*.qmd"
    - "resources/*.qmd"

website:
  title: "Intro to Statistics"
  site-url: https://matthewhester.com/intro-stats/
  description: |
    Public-facing course resources for Intro to Statistics — concepts,
    activities, and reproducible R examples curated by Matt Hester.
  open-graph: true

  navbar:
    pinned: true
    background: dark
    logo: assets/figures/intro-stats-icon.png
    logo-alt: "Intro to Statistics crystal mark"
    left:
      - href: index.qmd
        text: Home
      - href: syllabus.qmd
        text: Syllabus
      - href: schedule.qmd
        text: Schedule

  sidebar:
    style: floating
    collapse-level: 2
    contents:
      - section: "Notes"
        href: notes/index.qmd
        contents:
          - notes/index.qmd
          - notes/week01-data-evidence.qmd
          - notes/week02-study-design.qmd
          - notes/week03-one-variable-summaries.qmd
          - notes/week04-comparing-groups.qmd
          - notes/week05-association.qmd
          - notes/week06-confounding.qmd
          - notes/week07-synthesis-midterm.qmd
          - notes/week08-simple-regression.qmd
          - notes/week09-multiple-logistic-regression.qmd
          - notes/week10-probability-risk-diagnosis.qmd
          - notes/week11-simulation-based-inference.qmd
          - notes/week12-classical-hypothesis-testing.qmd
          - notes/week13-categorical-outcomes.qmd
          - notes/week14-meta-analysis-forest-plots.qmd
          - notes/week15-final-case-synthesis.qmd
      - section: "Activities"
        href: activities/index.qmd
        contents:
          - activities/index.qmd
      - section: "Assignments"
        href: assignments/index.qmd
        contents:
          - assignments/index.qmd
      - section: "Projects"
        href: projects/index.qmd
        contents:
          - projects/index.qmd
      - section: "Resources"
        href: resources/index.qmd
        contents:
          - resources/index.qmd

  page-footer:
    left: "© 2026 Matt Hester · Intro to Statistics"
    center: "[Matt Hester · matthewhester.com](https://matthewhester.com/)"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-location: right
    anchor-sections: true
    smooth-scroll: true
    link-external-newwindow: true
    fontsize: 1.05em
    mainfont: "Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    monofont: "JetBrains Mono, Consolas, Menlo, monospace"
